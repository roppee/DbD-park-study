<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Fog Academy</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="The Fog Academy">
<link rel="apple-touch-icon" href="the_fog_academy_icon.png">
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Cinzel:wght@400;600&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0608;--surface:#110d0f;--surface2:#1a1218;--border:#3a1f2a;--border-glow:#8b2535;--red:#c0392b;--red-bright:#e74c3c;--amber:#e8a040;--amber-dim:#8a5a1a;--fog-light:#a89ab8;--text:#f0e4d4;--text-dim:#c0a898;--text-faint:#6a5a5a;--white:#f5ece0;--green:#2ecc71;--green-dim:#1a6a3a}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans JP',sans-serif;min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 50% at 50% 0%,#1a0a1a55 0%,transparent 60%),radial-gradient(ellipse 60% 80% at 20% 100%,#0a0a2a44 0%,transparent 50%);pointer-events:none;z-index:0}
.app{position:relative;z-index:1;max-width:900px;margin:0 auto;padding:16px}
header{text-align:center;padding:28px 0 20px;border-bottom:1px solid var(--border);margin-bottom:24px}
header h1{font-family:'Cinzel Decorative',serif;font-size:clamp(18px,4vw,28px);color:var(--red-bright);text-shadow:0 0 20px #c0392b88;letter-spacing:2px;line-height:1.2}
header p{color:var(--fog-light);font-size:12px;margin-top:6px;font-family:'Cinzel',serif;letter-spacing:3px;text-transform:uppercase}
.nav{display:flex;gap:4px;margin-bottom:20px;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:4px}
.nav-btn{flex:1;padding:10px 8px;background:none;border:none;color:var(--text-dim);cursor:pointer;font-family:'Cinzel',serif;font-size:11px;letter-spacing:1px;border-radius:4px;transition:all .2s;text-align:center}
.nav-btn:hover{color:var(--text);background:var(--surface2)}
.nav-btn.active{background:var(--border-glow);color:var(--white)}
.section{display:none}.section.active{display:block}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:20px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:14px;text-align:center}
.stat-num{font-size:28px;font-weight:700;color:var(--red-bright)}
.stat-label{font-size:11px;color:var(--text-dim);margin-top:4px;font-family:'Cinzel',serif;letter-spacing:1px}
.reset-btn{margin-top:8px;padding:4px 10px;background:none;border:1px solid #5a2a2a;color:var(--red);font-size:10px;cursor:pointer;border-radius:4px;transition:all .2s}
.reset-btn:hover{background:#2a0a0a}
.perk-controls{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.search-input{flex:1;min-width:180px;background:var(--surface);border:1px solid var(--border);color:var(--text);padding:10px 14px;border-radius:4px;font-size:13px;outline:none}
.search-input:focus{border-color:var(--border-glow)}
.search-input::placeholder{color:var(--text-faint)}
.filter-select{background:var(--surface);border:1px solid var(--border);color:var(--text-dim);padding:10px 12px;border-radius:4px;font-size:12px;cursor:pointer;outline:none}
.perk-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px}
.perk-card{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:14px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.perk-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--border-glow);opacity:0;transition:opacity .2s}
.perk-card:hover{border-color:var(--border-glow);background:var(--surface2)}
.perk-card:hover::before{opacity:1}
.perk-card-header{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.perk-name{font-family:'Cinzel',serif;font-size:13px;font-weight:600;color:var(--amber);line-height:1.3}
.perk-badge{font-size:10px;padding:2px 7px;border-radius:10px;white-space:nowrap;flex-shrink:0;margin-top:2px}
.badge-chase{background:#3a1a1a;color:#e74c3c;border:1px solid #5a2a2a}
.badge-gen{background:#1a2a1a;color:#2ecc71;border:1px solid #2a4a2a}
.badge-rescue{background:#1a1a3a;color:#5dade2;border:1px solid #2a2a5a}
.badge-info{background:#2a2a1a;color:#f1c40f;border:1px solid #4a4a2a}
.badge-misc{background:#2a1a2a;color:#a569bd;border:1px solid #4a2a4a}
.perk-owner{font-size:11px;color:var(--fog-light);margin:4px 0 8px}
.perk-desc{font-size:12px;color:var(--text-dim);line-height:1.6;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.perk-card-footer{display:flex;justify-content:space-between;align-items:center;margin-top:10px;padding-top:8px;border-top:1px solid var(--border)}
.learned-badge{font-size:10px;color:var(--green)}
.updated-badge{font-size:10px;color:var(--amber);background:#2a1a00;border:1px solid var(--amber-dim);padding:2px 7px;border-radius:10px}
.modal-overlay{display:none;position:fixed;inset:0;background:#000000cc;z-index:100;align-items:center;justify-content:center;padding:16px}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border-glow);border-radius:8px;max-width:560px;width:100%;max-height:85vh;overflow-y:auto;box-shadow:0 0 60px #8b253544}
.modal-header{padding:20px 20px 0;display:flex;justify-content:space-between;align-items:flex-start}
.modal-title{font-family:'Cinzel',serif;font-size:18px;font-weight:600;color:var(--amber)}
.modal-close{background:none;border:1px solid var(--border);color:var(--text-dim);width:28px;height:28px;border-radius:4px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.modal-close:hover{border-color:var(--red);color:var(--red-bright)}
.modal-body{padding:16px 20px 20px}
.modal-owner{color:var(--fog-light);font-size:12px;margin-bottom:12px}
.modal-desc{font-size:14px;line-height:1.8;color:var(--text);background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:14px;margin-bottom:14px;white-space:pre-wrap}
.modal-update{font-size:12px;background:#1a0f00;border:1px solid var(--amber-dim);border-radius:4px;padding:10px 14px;margin-bottom:14px;color:var(--amber);line-height:1.7}
.modal-update-label{font-family:'Cinzel',serif;font-size:10px;letter-spacing:2px;color:var(--amber-dim);margin-bottom:4px;text-transform:uppercase}
.modal-ai-btn{width:100%;padding:12px;background:var(--border-glow);border:none;color:var(--white);font-family:'Cinzel',serif;font-size:13px;letter-spacing:2px;cursor:pointer;border-radius:4px;transition:all .2s;margin-bottom:10px;display:flex;align-items:center;justify-content:center;gap:8px}
.modal-ai-btn:hover{background:var(--red-bright)}
.modal-ai-btn:disabled{background:var(--border);color:var(--text-faint);cursor:not-allowed}
.ai-response{background:var(--surface2);border:1px solid #2a3a2a;border-left:3px solid var(--green-dim);border-radius:4px;padding:14px;font-size:13px;line-height:1.8;color:var(--text);white-space:pre-wrap;display:none}
.ai-response.visible{display:block}
.learn-btn{width:100%;padding:10px;background:none;border:1px solid var(--green-dim);color:var(--green);font-family:'Cinzel',serif;font-size:12px;letter-spacing:1px;cursor:pointer;border-radius:4px;transition:all .2s;margin-top:10px}
.learn-btn:hover{background:var(--green-dim)}
.learn-btn.learned{border-color:var(--green);background:#0a2a1a}
.flashcard-area{display:flex;flex-direction:column;align-items:center;gap:16px}
.fc-info{font-size:12px;color:var(--text-dim);font-family:'Cinzel',serif;letter-spacing:2px}
.fc-mode-select{display:flex;gap:8px}
.fc-mode-btn{padding:7px 16px;background:var(--surface);border:1px solid var(--border);color:var(--text-dim);cursor:pointer;font-size:12px;border-radius:4px;transition:all .2s}
.fc-mode-btn.active{border-color:var(--amber-dim);color:var(--amber);background:#1a1200}
.flashcard{width:100%;max-width:520px;height:260px;perspective:1000px;cursor:pointer}
.flashcard-inner{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform .5s}
.flashcard.flipped .flashcard-inner{transform:rotateY(180deg)}
.fc-front,.fc-back{position:absolute;inset:0;border-radius:8px;backface-visibility:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center;border:1px solid var(--border)}
.fc-front{background:var(--surface);border-color:var(--border-glow)}
.fc-back{background:var(--surface2);transform:rotateY(180deg);border-color:var(--green-dim)}
.fc-hint{font-size:11px;color:var(--text-faint);margin-bottom:12px;letter-spacing:2px;text-transform:uppercase;font-family:'Cinzel',serif}
.fc-front-name{font-family:'Cinzel',serif;font-size:clamp(18px,4vw,26px);font-weight:600;color:var(--amber);line-height:1.3}
.fc-front-owner{font-size:12px;color:var(--fog-light);margin-top:8px}
.fc-back-desc{font-size:13px;line-height:1.7;color:var(--text)}
.fc-actions{display:flex;gap:10px;width:100%;max-width:520px}
.fc-btn{flex:1;padding:12px;border:1px solid;border-radius:4px;cursor:pointer;font-family:'Cinzel',serif;font-size:12px;letter-spacing:1px;background:none;transition:all .2s}
.fc-btn-forget{border-color:#5a2a2a;color:var(--red)}
.fc-btn-forget:hover{background:#2a0a0a}
.fc-btn-learn{border-color:var(--green-dim);color:var(--green)}
.fc-btn-learn:hover{background:#0a2a1a}
.fc-btn-skip{border-color:var(--border);color:var(--text-dim)}
.fc-btn-skip:hover{background:var(--surface2)}
.progress-bar-wrap{width:100%;max-width:520px;background:var(--surface);border:1px solid var(--border);border-radius:4px;height:6px;overflow:hidden}
.progress-bar-fill{height:100%;background:linear-gradient(90deg,var(--red),var(--amber));transition:width .3s}
.quiz-area{max-width:620px;margin:0 auto}
.quiz-q-count{font-size:12px;color:var(--text-dim);margin-bottom:16px;font-family:'Cinzel',serif;letter-spacing:2px;text-align:center}
.quiz-question{background:var(--surface);border:1px solid var(--border-glow);border-radius:8px;padding:20px;margin-bottom:16px}
.quiz-q-label{font-size:11px;color:var(--border-glow);letter-spacing:3px;text-transform:uppercase;font-family:'Cinzel',serif;margin-bottom:10px}
.quiz-q-text{font-size:14px;line-height:1.7;color:var(--text)}
.quiz-q-perkname{font-family:'Cinzel',serif;font-size:18px;color:var(--amber);text-align:center;padding:10px 0}
.quiz-options{display:grid;gap:8px}
.quiz-option{padding:13px 16px;background:var(--surface);border:1px solid var(--border);border-radius:4px;cursor:pointer;font-size:13px;color:var(--text);text-align:left;transition:all .2s;line-height:1.5}
.quiz-option:hover:not(:disabled){border-color:var(--fog-light);background:var(--surface2)}
.quiz-option.correct{border-color:var(--green);background:#0a2a1a;color:var(--green)}
.quiz-option.wrong{border-color:var(--red);background:#2a0a0a;color:var(--red-bright)}
.quiz-option:disabled{cursor:default}
.quiz-feedback{padding:12px 16px;border-radius:4px;font-size:13px;line-height:1.6;display:none;margin-top:8px}
.quiz-feedback.correct{background:#0a2a1a;border:1px solid var(--green-dim);color:var(--green);display:block}
.quiz-feedback.wrong{background:#2a0a0a;border:1px solid #5a2a2a;color:var(--red-bright);display:block}
.quiz-next-btn{width:100%;margin-top:14px;padding:13px;background:var(--border-glow);border:none;color:var(--white);font-family:'Cinzel',serif;font-size:13px;letter-spacing:2px;cursor:pointer;border-radius:4px;display:none;transition:all .2s}
.quiz-next-btn:hover{background:var(--red-bright)}
.quiz-next-btn.visible{display:block}
.quiz-result{text-align:center;padding:40px 20px;display:none}
.quiz-result.visible{display:block}
.quiz-result-title{font-family:'Cinzel Decorative',serif;font-size:24px;color:var(--amber);margin-bottom:16px}
.quiz-result-score{font-size:48px;font-weight:700;color:var(--red-bright);margin-bottom:16px}
.quiz-result-detail{color:var(--text-dim);font-size:14px;margin-bottom:24px}
.quiz-restart-btn{padding:12px 32px;background:var(--border-glow);border:none;color:var(--white);font-family:'Cinzel',serif;font-size:13px;letter-spacing:2px;cursor:pointer;border-radius:4px}
.quiz-restart-btn:hover{background:var(--red-bright)}
.update-feed{display:flex;flex-direction:column;gap:12px}
.update-card{background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--amber-dim);border-radius:6px;padding:16px}
.update-version{font-family:'Cinzel',serif;font-size:11px;color:var(--amber);letter-spacing:2px;margin-bottom:6px}
.update-perk-item{font-size:13px;color:var(--text-dim);line-height:1.6;margin-bottom:4px}
.update-perk-item strong{color:var(--text)}
.add-update-form{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:16px;margin-bottom:16px}
.add-update-title{font-family:'Cinzel',serif;font-size:13px;color:var(--amber);margin-bottom:12px;letter-spacing:2px}
.form-row{display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.form-input{flex:1;min-width:120px;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:9px 12px;border-radius:4px;font-size:13px;outline:none;font-family:'Noto Sans JP',sans-serif}
.form-input:focus{border-color:var(--border-glow)}
.form-textarea{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:9px 12px;border-radius:4px;font-size:13px;outline:none;resize:vertical;min-height:80px;font-family:'Noto Sans JP',sans-serif;line-height:1.6;margin-bottom:8px}
.form-textarea:focus{border-color:var(--border-glow)}
.form-submit-btn{padding:10px 20px;background:var(--border-glow);border:none;color:var(--white);font-family:'Cinzel',serif;font-size:12px;letter-spacing:1px;cursor:pointer;border-radius:4px}
.form-submit-btn:hover{background:var(--red-bright)}
.empty-state{text-align:center;padding:40px;color:var(--text-faint);font-size:14px}
.cat-btns{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.cat-btn{padding:7px 14px;background:var(--surface);border:1px solid var(--border);color:var(--text-dim);cursor:pointer;font-size:12px;border-radius:20px;transition:all .2s;font-family:'Noto Sans JP',sans-serif}
.cat-btn:hover{border-color:var(--fog-light);color:var(--text)}
.cat-btn.active{color:var(--white);border-color:transparent}
.cat-btn[data-cat="all"].active{background:var(--border-glow)}
.cat-btn[data-cat="chase"].active{background:#5a2a2a;border-color:#e74c3c;color:#e74c3c}
.cat-btn[data-cat="gen"].active{background:#1a3a1a;border-color:#2ecc71;color:#2ecc71}
.cat-btn[data-cat="rescue"].active{background:#1a1a3a;border-color:#5dade2;color:#5dade2}
.cat-btn[data-cat="info"].active{background:#3a3a1a;border-color:#f1c40f;color:#f1c40f}
.cat-btn[data-cat="misc"].active{background:#2a1a2a;border-color:#a569bd;color:#a569bd}
.api-key-bar{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:12px 14px;margin-bottom:16px;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.api-key-label{font-size:11px;color:var(--fog-light);font-family:'Cinzel',serif;letter-spacing:1px;white-space:nowrap}
.api-key-input{flex:1;min-width:200px;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:8px 12px;border-radius:4px;font-size:12px;outline:none;font-family:monospace}
.api-key-input:focus{border-color:var(--border-glow)}
.api-key-btn{padding:8px 14px;background:var(--border-glow);border:none;color:var(--white);font-size:12px;cursor:pointer;border-radius:4px;white-space:nowrap}
.api-key-btn:hover{background:var(--red-bright)}
.api-key-status{font-size:11px;width:100%}
.api-key-status.ok{color:var(--green)}
.api-key-status.ng{color:var(--red-bright)}
.check-update-btn{width:100%;padding:11px;background:none;border:1px solid var(--amber-dim);color:var(--amber);font-family:'Cinzel',serif;font-size:12px;letter-spacing:1px;cursor:pointer;border-radius:4px;transition:all .2s;margin-bottom:14px;display:flex;align-items:center;justify-content:center;gap:8px}
.check-update-btn:hover{background:#1a0f00}
.check-update-btn:disabled{opacity:.5;cursor:not-allowed}
.check-result{background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:12px 14px;font-size:13px;line-height:1.8;color:var(--text);margin-bottom:14px;white-space:pre-wrap;display:none}
.check-result.visible{display:block}
.loading-dots::after{content:'';animation:dots 1.2s steps(4,end) infinite}
@keyframes dots{0%{content:''}25%{content:'.'}50%{content:'..'}75%{content:'...'}100%{content:''}}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
@media(max-width:480px){.perk-grid{grid-template-columns:1fr}.stat-num{font-size:20px}}
</style>
</head>
<body>
<div class="app">
  <header>
    <h1>&#x26B0; The Fog Academy &#x26B0;</h1>
    <p>Dead by Daylight &mdash; Survivor Perk Study</p>
    <p style="font-size:10px;color:#e74c3c;letter-spacing:2px;margin-top:4px;">BETA VERSION</p>
  </header>
  <div class="stats-row">
    <div class="stat-card"><div class="stat-num" id="statTotal">0</div><div class="stat-label">Total Perks</div></div>
    <div class="stat-card"><div class="stat-num" id="statLearned">0</div><div class="stat-label">Learned</div><button class="reset-btn" onclick="resetLearned()">リセット</button></div>
    <div class="stat-card"><div class="stat-num" id="statUpdated">0</div><div class="stat-label">Updated</div></div>
  </div>
  <nav class="nav">
    <button class="nav-btn active" onclick="switchTab('list',this)">パーク一覧</button>
    <button class="nav-btn" onclick="switchTab('flash',this)">フラッシュカード</button>
    <button class="nav-btn" onclick="switchTab('quiz',this)">クイズ</button>
    <button class="nav-btn" onclick="switchTab('updates',this)">更新履歴</button>
  </nav>
  <div class="section active" id="tab-list">
    <div class="api-key-bar">
      <span class="api-key-label">&#x1F511; APIキー</span>
      <input type="password" class="api-key-input" id="apiKeyInput" placeholder="sk-ant-... (AI解説に必要)">
      <button class="api-key-btn" onclick="saveApiKey()">保存</button>
      <span class="api-key-status" id="apiKeyStatus"></span>
    </div>
    <div class="cat-btns">
      <button class="cat-btn active" data-cat="all" onclick="setCat('all',this)">すべて</button>
      <button class="cat-btn" data-cat="chase" onclick="setCat('chase',this)">&#x1F3C3; チェイス</button>
      <button class="cat-btn" data-cat="gen" onclick="setCat('gen',this)">&#x26A1; 発電機</button>
      <button class="cat-btn" data-cat="rescue" onclick="setCat('rescue',this)">&#x1F91D; 救助</button>
      <button class="cat-btn" data-cat="info" onclick="setCat('info',this)">&#x1F441; 情報</button>
      <button class="cat-btn" data-cat="misc" onclick="setCat('misc',this)">&#x2728; その他</button>
    </div>
    <div class="perk-controls">
      <input type="text" class="search-input" id="searchInput" placeholder="パーク名・説明文で検索..." oninput="renderPerkList()">
      <select class="filter-select" id="filterStatus" onchange="renderPerkList()">
        <option value="">すべて</option>
        <option value="learned">学習済み</option>
        <option value="unlearned">未学習</option>
        <option value="updated">最近変更</option>
      </select>
    </div>
    <div class="perk-grid" id="perkGrid"></div>
  </div>
  <div class="section" id="tab-flash">
    <div class="flashcard-area">
      <div class="fc-mode-select">
        <button class="fc-mode-btn active" onclick="setFcMode('all',this)">全パーク</button>
        <button class="fc-mode-btn" onclick="setFcMode('unlearned',this)">未学習のみ</button>
        <button class="fc-mode-btn" onclick="setFcMode('updated',this)">最近変更</button>
      </div>
      <div class="progress-bar-wrap"><div class="progress-bar-fill" id="fcProgress" style="width:0%"></div></div>
      <div class="fc-info" id="fcInfo">0 / 0</div>
      <div class="flashcard" id="flashcard" onclick="flipCard()">
        <div class="flashcard-inner">
          <div class="fc-front">
            <div class="fc-hint">パーク名 &rarr; 効果を思い出そう</div>
            <div class="fc-front-name" id="fcName">&mdash;</div>
            <div class="fc-front-owner" id="fcOwner"></div>
          </div>
          <div class="fc-back">

<script>
var PERKS = [
  {id:"bond",name:"絆",owner:"ドワイト・フェアフィールド",cat:"info",desc:"(20/28/36)メートル以内にいる仲間のオーラを可視化する。",updated:null},
  {id:"prove_thyself",name:"有能の証明",owner:"ドワイト・フェアフィールド",cat:"gen",desc:"4メートル以内で発電機を修理している生存者は修理速度が(6/8/10)%上昇する。範囲内の生存者全員にも同じ上昇が適用される。効果は1度につき1つのみ適用される。",updated:null},
  {id:"leader",name:"リーダー",owner:"ドワイト・フェアフィールド",cat:"misc",desc:"10メートル以内にいる他の生存者の治療・破壊工作・フックからの救助・浄化・ゲートの開放・チェスト開錠の速度が(20/25/30)%上昇する。効果は範囲外に出た後も20秒間持続する。",updated:null},
  {id:"quick_and_quiet",name:"素早く静かに",owner:"メグ・トーマス",cat:"chase",desc:"乗り越えや隠れるアクションで発生する音の探知範囲と聞こえる範囲が100%減少する。(25/20/15)秒間のクールタイムがある。",updated:null},
  {id:"sprintburst",name:"全力疾走",owner:"メグ・トーマス",cat:"chase",desc:"走り始めたとき、通常の150%の速度で最大3秒間全力で走る。(60/50/40)秒間の疲労を発生させる。全力疾走は疲労中は発動できない。走行中は疲労から回復しない。",updated:null},
  {id:"adrenaline",name:"アドレナリン",owner:"メグ・トーマス",cat:"misc",desc:"脱出ゲートが通電すると発動。負傷または瀕死状態だった場合、健康状態が即座に1段階回復し150%の速さで3秒間走ることができる。疲労のステータス効果を無視し、疲労を(60/50/40)秒間発生させる。",updated:null},
  {id:"empathy",name:"共感",owner:"クローデット・モレル",cat:"info",desc:"(64/96/128)メートル以内にいる瀕死または負傷状態の仲間のオーラが視えるようになる。殺人鬼に直接触られている仲間のオーラは視ることができない。",updated:null},
  {id:"botany",name:"植物学の知識",owner:"クローデット・モレル",cat:"rescue",desc:"治療速度の効率が(30/40/50)%上昇する。",updated:null},
  {id:"self_care",name:"セルフケア",owner:"クローデット・モレル",cat:"misc",desc:"医療キットを使わずに、通常の(25/30/35)%の速度で自己治療ができるようになる。",updated:null},
  {id:"iron_will",name:"鋼の意思",owner:"ジェイク・パーク",cat:"misc",desc:"痛みによるうめき声が(80/90/100)%減少する。疲労中は効果が発揮されない。このパークによって疲労が適用されることはない。",updated:null},
  {id:"calm_spirit",name:"魂の平穏",owner:"ジェイク・パーク",cat:"misc",desc:"森の生き物を驚かせる確率が100%低下する。叫び声をあげたい衝動を抑えることができる。チェストの開放時とトーテム恵み付与時に音が発生しない。ただしこれらアクションの実行速度が(40/35/30)%低下する。",updated:null},
  {id:"saboteur",name:"サボタージュ",owner:"ジェイク・パーク",cat:"misc",desc:"別の生存者が運ばれている場合、担がれた場所から半径56メートル内にあるフックのオーラが視える。工具箱を使わなくてもフックを破壊できる（所要時間2.3秒）。フック破壊アクションには(70/65/60)秒のクールダウンがある。",updated:null},
  {id:"balanced_landing",name:"スマートな着地",owner:"ネア・カールソン",cat:"chase",desc:"高所から落ちた後、落下時のよろめく時間が75%減少しうめき声の大きさが100%低下する。50%の迅速を最大3秒間得る。(60/50/40)秒間の疲労を発生させる。疲労中は使用できない。走っている間、疲労は回復しない。",updated:null},
  {id:"urban_evasion",name:"都会の逃走術",owner:"ネア・カールソン",cat:"chase",desc:"しゃがみ状態の移動速度が(90/95/100)%上昇する。",updated:null},
  {id:"streetwise",name:"都会の生存術",owner:"ネア・カールソン",cat:"misc",desc:"チャージのあるアイテムを初めて使い果たした際、殺人鬼のオーラが8秒間視える。チェストからチャージのあるアイテムを回収する際、チャージ量が(60/70/80)%増加した状態で手に入る。",updated:null},
  {id:"open_handed",name:"手札公開",owner:"エース・ヴィスコンティ",cat:"info",desc:"オーラの可視能力の有効距離が(8/12/16)メートル上昇する。一度に適用される手札公開の効果は1回のみ。",updated:null},
  {id:"up_the_ante",name:"賭け金のレイズ",owner:"エース・ヴィスコンティ",cat:"misc",desc:"自分以外の生き残っている生存者1人につき、生存者全員の運が(1/2/3)%増加する。生存者全員がフックから自力で脱出を試みる能力を得る。",updated:null},
  {id:"ace_in_the_hole",name:"最後の切り札",owner:"エース・ヴィスコンティ",cat:"misc",desc:"チェストからアイテムを取得したとき、100%の確率でベリーレア以下のアドオンが1つ装着される。(10/25/50)%の確率でアンコモン以下のアドオンが見つかる。逃れる際にアイテムに装着したアドオンを保持できる。",updated:null},
  {id:"technician",name:"テクニシャン",owner:"フェン・ミン",cat:"gen",desc:"修理時に発生する物音と聞こえる範囲が8メートル減少する。修理のスキルチェックに失敗すると発電機の爆発が起きないが、進行度が追加で(5/4/3)%減少する。",updated:null},
  {id:"lithe",name:"しなやか",owner:"フェン・ミン",cat:"chase",desc:"高速乗り越えを行うと加速し、移動速度が最大3秒間通常の150%に上昇する。(60/50/40)秒間の疲労を発生させる。疲労時は使用できない。走っている間、疲労は回復しない。",updated:null},
  {id:"alert",name:"警戒",owner:"フェン・ミン",cat:"info",desc:"殺人鬼が破壊アクションを行ったとき、殺人鬼が(3/4/5)秒間視えるようになる。",updated:null},
  {id:"sole_survivor",name:"唯一の生存者",owner:"ローリー・ストロード",cat:"misc",desc:"仲間の生存者が死亡するか処刑されるたび1トークン獲得。1トークンにつき(20/22/24)メートル範囲内でオーラが探知されない。最後の生存者になると発電機修理速度75%上昇、脱出ゲートとハッチの開錠速度50%上昇。",updated:null},
  {id:"object_of_obsession",name:"執念の対象",owner:"ローリー・ストロード",cat:"info",desc:"殺人鬼に自分のオーラが視えている間、こちらも殺人鬼のオーラが視えるようになり、治療・修理・浄化の速度がそれぞれ(2/4/6)%上昇する。オブセッションになる確率が上がる。",updated:null},
  {id:"decisive_strike",name:"決死の一撃",owner:"ローリー・ストロード",cat:"chase",desc:"フックから救助されるか自力で脱出した後、(40/50/60)秒間発動する。発動中に殺人鬼に捕まった場合、スキルチェックに成功すると殺人鬼の手から逃れ4秒間怯ませる。成功・失敗どちらでもパークは解除される。脱出ゲートが通電すると解除される。",updated:null},
  {id:"wglf",name:"ずっと一緒だ",owner:"デイビッド・キング",cat:"rescue",desc:"瀕死状態の生存者を治療する時の治療速度が100%上昇する。治療が完了すると、回復させた生存者が我慢のステータス効果を(6/8/10)秒間得る。この効果には30秒間のクールダウンがある。",updated:null},
  {id:"dead_hard",name:"デッド・ハード",owner:"デイビッド・キング",cat:"chase",desc:"フックから救助されるか自力で脱出すると発動する。負傷時、走りながらアビリティ発動ボタンを押すと我慢のステータス効果を0.5秒得る。(60/50/40)秒間の疲労が発生し、その後パークは解除される。",updated:null},
  {id:"no_mither",name:"弱音はナシだ",owner:"デイビッド・キング",cat:"misc",desc:"儀式の間、衰弱状態になる。血痕を残さなくなる。負傷によるうめき声が常時100%低減される。回復速度が(15/20/25)%上昇して、瀕死状態から完全に回復する能力を得る。",updated:null},
  {id:"wake_up",name:"目を覚ませ！",owner:"クエンティン・スミス",cat:"misc",desc:"全ての発電機が通電すると脱出ゲートのオーラが視える。脱出ゲートを開放している間、他の生存者はあなたのオーラを視ることができる。脱出ゲートを開く速度が生き残っている生存者1人につき(8/10/12.5)%上昇する。",updated:null},
  {id:"pharmacy",name:"調剤学",owner:"クエンティン・スミス",cat:"misc",desc:"負傷すると発動。チェストの調査速度が(75/100/125)%上昇し、チェスト開錠時の音の聞こえる範囲が12メートル減少する。チェスト開錠完了時に非常用医療キットが確実に手に入る。",updated:null},
  {id:"vigil",name:"寝ずの番",owner:"クエンティン・スミス",cat:"misc",desc:"自分と16メートル以内の生存者が各種ステータス効果から回復する速度が(44/55/66)%上昇する。効果は範囲外に出た後も15秒間持続する。",updated:null},
  {id:"tenacity",name:"執念",owner:"タップ刑事",cat:"misc",desc:"瀕死状態の間(30/40/50)%の迅速を得て、這って動いている間も自分の回復が進行する。瀕死状態の間、自分のオーラが殺人鬼に表示されず、痛みによるうなり声が75%減少する。",updated:null},
  {id:"detective_hunch",name:"刑事の直感",owner:"タップ刑事",cat:"info",desc:"発電機の修理完了時、(32/48/64)メートル以内の発電機・チェスト・トーテムのオーラが20秒間視えるようになる。",updated:null},
  {id:"stake_out",name:"張り込み",owner:"タップ刑事",cat:"gen",desc:"殺人鬼の脅威範囲内で追跡されていない時、15秒ごとにトークンが1溜まる（最大(2/3/4)トークン）。1トークン以上溜まっている場合、グッドのスキルチェックがグレイトとみなされ1トークンを消費し発電機修理の進行度が1%追加される。",updated:null},
  {id:"dance_with_me",name:"ダンス・ウィズ・ミー",owner:"ケイト・デンソン",cat:"chase",desc:"素早い乗り越えを行ったり、ロッカーから飛び出したりするとき、5秒間赤い傷マークを残さない。(25/20/15)秒間のクールダウンがある。",updated:null},
  {id:"windows",name:"ウィンドウズ・オブ・オポチュニティ",owner:"ケイト・デンソン",cat:"chase",desc:"(24/28/32)メートル以内のパレット・破壊可能な壁・乗り越え障害物のオーラを視ることができる。",updated:null},
  {id:"boil_over",name:"ボイルオーバー",owner:"ケイト・デンソン",cat:"misc",desc:"担がれた時の抵抗力が(60/70/80)%増加する。16メートル以内にあるフックのオーラを探知する殺人鬼の能力を妨害する。殺人鬼が高所から落ちた時、もがきの進行度がその時点から33%進む。",updated:null},
  {id:"diversion",name:"陽動",owner:"アダム・フランシス",cat:"misc",desc:"追いかけられていない状態で殺人鬼の脅威範囲内に(40/25/20)秒間いると発動。動かずにしゃがんだ状態でアビリティボタンを押すと小石を投げ、20メートル離れた先に殺人鬼を陽動できる。",updated:null},
  {id:"deliverance",name:"解放",owner:"アダム・フランシス",cat:"rescue",desc:"他の生存者を安全にフックから救出した後に発動。100%の確率でフックから自力で脱出する試みが成功する。解放によってフックから脱出すると、(100/80/60)秒間衰弱のステータス効果を受ける。",updated:null},
  {id:"autodidact",name:"独学者",owner:"アダム・フランシス",cat:"rescue",desc:"他の生存者を治療する際のスキルチェックに-15%の進行度ペナルティを受けた状態で開始。スキルチェック成功ごとにトークンを1個獲得（最大(3/4/5)トークン）。1トークンにつき+15%の進行ボーナスを付与。",updated:null},
  {id:"left_behind",name:"置き去りにされた者",owner:"ウィリアム・ビル・オーバーベック",cat:"info",desc:"儀式で最後の生存者となった場合、(24/28/32)メートル以内にあるハッチのオーラが見える。",updated:null},
  {id:"borrowed_time",name:"与えられた猶予",owner:"ウィリアム・ビル・オーバーベック",cat:"rescue",desc:"フックから救助した生存者は以下の効果を得る。我慢のステータス効果時間が(6/8/10)秒延長される。移動速度の上昇持続時間が10秒延長される。",updated:null},
  {id:"unbreakable",name:"不滅",owner:"ウィリアム・ビル・オーバーベック",cat:"misc",desc:"1マッチに1回のみ、瀕死状態から完全回復することができる。瀕死時の回復速度が(25/30/35)%上昇する。",updated:null},
  {id:"breakdown",name:"ブレイクダウン",owner:"ジェフ・ヨハンセン",cat:"rescue",desc:"フックから脱出するか救出されると、そのフックは破壊され、殺人鬼のオーラが(4/5/6)秒間表示される。このパークによって破壊されたフックが再出現するまで180秒かかる。",updated:null},
  {id:"aftercare",name:"アフターケア",owner:"ジェフ・ヨハンセン",cat:"info",desc:"自分がフックから救助した・自分をフックから救助した・自分が治療を完了した・自分の治療を完了した生存者のオーラが互いに視える。最大(1/2/3)人分。殺人鬼に吊るされると全ての効果が失われる。",updated:null},
  {id:"distortion",name:"ディストーション",owner:"ジェフ・ヨハンセン",cat:"info",desc:"1個のトークンで儀式を始める。自分のオーラが視られる可能性があるとき発動し1トークン消費。(8/10/12)秒間、オーラと赤い傷マークが殺人鬼に表示されなくなる。追跡された15秒につき1トークンを再取得（最大2個）。",updated:null},
  {id:"solidarity",name:"連帯感",owner:"ジェーン・ロメロ",cat:"rescue",desc:"負傷時に医療キットを使わず生存者を治療すると、(50/60/70)%の変換率で自分の傷も回復する。",updated:null},
  {id:"poised",name:"平常心",owner:"ジェーン・ロメロ",cat:"info",desc:"発電機の修理を初めて開始したとき、殺人鬼のオーラが8秒間表示される。発電機の修理が完了すると、(20/25/30)秒間赤い傷マークを残さない。",updated:null},
  {id:"head_on",name:"真っ向勝負",owner:"ジェーン・ロメロ",cat:"chase",desc:"3秒間ロッカーの中に立っていると発動可能になる。発動可能な状態でロッカーを飛び出すと有効範囲内にいる殺人鬼を3秒間怯ませる。疲労を(60/50/40)秒間発生させる。疲労時は使用できない。",updated:null},
  {id:"babysitter",name:"ベビーシッター",owner:"スティーブ・ハリントン",cat:"rescue",desc:"生存者をフックから救助すると、救助された生存者は赤い傷マークと血痕が残らなくなり、(20/25/30)秒間10%の迅速ステータス効果を得る。殺人鬼のオーラが8秒間視える。",updated:null},
  {id:"camaraderie",name:"仲間意識",owner:"スティーブ・ハリントン",cat:"rescue",desc:"フックに吊るされて耐久フェーズになった時に発動。他の生存者が自分から16メートル以内にいる場合、フックのゲージが(26/30/34)秒間停止する。",updated:null},
  {id:"second_wind",name:"セカンドウインド",owner:"スティーブ・ハリントン",cat:"rescue",desc:"他の生存者を負傷1回分に相当する量だけ治療すると発動。次に自分がフックから救出されるか自力で脱出すると衰弱のステータス効果を受け、合計(28/24/20)秒経過すると負傷から無傷に回復する。",updated:null},
  {id:"together",name:"一緒にいよう",owner:"ナンシー・ウィーラー",cat:"info",desc:"自分が修理している発電機のオーラが他の生存者全員に視える。自分が発電機を修理している間に生存者が殺人鬼にダウンさせられると、(20/25/30)秒間他の生存者全員のオーラが視える。",updated:null},
  {id:"fixated",name:"執着心",owner:"ナンシー・ウィーラー",cat:"chase",desc:"自分の残した赤い傷マークが常に視えるようになる。歩行速度が通常よりも(10/15/20)%上昇する。",updated:null},
  {id:"inner_strength",name:"内なる力",owner:"ナンシー・ウィーラー",cat:"misc",desc:"トーテムを浄化するたびに発動可能になる。衰弱状態でない場合、負傷状態でロッカー内に(10/9/8)秒間隠れると負傷から無傷に回復する。発動に成功すると内なる力は解除される。",updated:null},
  {id:"kindred",name:"血族",owner:"共通パーク",cat:"info",desc:"フックに吊るされているとき、生存者のオーラが他の生存者全員から視えるようになる。殺人鬼の近くにいる生存者がいない場合は殺人鬼のオーラも視える。",updated:null},
  {id:"deja_vu",name:"デジャヴ",owner:"共通パーク",cat:"gen",desc:"互いに近接している3台の発電機のオーラが視える。可視化された発電機の修理速度が(4/5/6)%上昇する。",updated:null},
  {id:"spine_chill",name:"背筋も凍る",owner:"共通パーク",cat:"info",desc:"キラーが自分の方向を向いて一定距離以内にいるとアイコンが光り、各種行動速度が上昇する。キラー接近の早期察知に有効。",updated:"8.6.0: 感知距離が調整、発動条件がわかりやすく変更された。"},
  {id:"hope",name:"希望",owner:"共通パーク",cat:"misc",desc:"脱出ゲートが通電すると(3/4/5)%の迅速ステータス効果を受ける。",updated:null}
];

var learned = JSON.parse(localStorage.getItem("dbd_learned") || "[]");
var updates = JSON.parse(localStorage.getItem("dbd_updates") || "[]");
var currentModal = null;
var fcQueue = [], fcIndex = 0, fcMode = "all";
var quizState = {questions:[], current:0, score:0, answered:false};
var currentCat = "all";

// APIキー管理
function getApiKey() { return localStorage.getItem("dbd_apikey") || ""; }
function saveApiKey() {
  var key = document.getElementById("apiKeyInput").value.trim();
  var st = document.getElementById("apiKeyStatus");
  if (!key) { st.className = "api-key-status ng"; st.textContent = "キーを入力してください"; return; }
  if (!key.startsWith("sk-ant-")) { st.className = "api-key-status ng"; st.textContent = "形式が違います（sk-ant-...で始まるキー）"; return; }
  localStorage.setItem("dbd_apikey", key);
  document.getElementById("apiKeyInput").value = "";
  st.className = "api-key-status ok"; st.textContent = "✓ 保存しました！AI解説が使えます";
}

// カテゴリボタン
function setCat(cat, btn) {
  currentCat = cat;
  document.querySelectorAll(".cat-btn").forEach(function(b) { b.classList.remove("active"); });
  btn.classList.add("active");
  renderPerkList();
}

(function applyUpdates() {
  updates.forEach(function(u) {
    var p = PERKS.find(function(p) { return p.name === u.perkName; });
    if (p) p.updated = u.version + ": " + u.content;
  });
})();

function isLearned(id) { return learned.indexOf(id) >= 0; }

function resetLearned() {
  if (!confirm("学習済みをすべてリセットしますか？")) return;
  learned = [];
  localStorage.setItem("dbd_learned", JSON.stringify(learned));
  updateStats();
  renderPerkList();
}

function toggleLearn(id) {
  if (isLearned(id)) learned = learned.filter(function(x) { return x !== id; });
  else learned.push(id);
  localStorage.setItem("dbd_learned", JSON.stringify(learned));
  updateStats();
}

function updateStats() {
  document.getElementById("statTotal").textContent = PERKS.length;
  document.getElementById("statLearned").textContent = learned.length;
  document.getElementById("statUpdated").textContent = PERKS.filter(function(p) { return p.updated; }).length;
}

var CAT_LABELS = {chase:"チェイス", gen:"発電機", rescue:"救助", info:"情報", misc:"その他"};
var CAT_BADGE  = {chase:"badge-chase", gen:"badge-gen", rescue:"badge-rescue", info:"badge-info", misc:"badge-misc"};

function switchTab(tab, btn) {
  document.querySelectorAll(".section").forEach(function(s) { s.classList.remove("active"); });
  document.querySelectorAll(".nav-btn").forEach(function(b) { b.classList.remove("active"); });
  document.getElementById("tab-" + tab).classList.add("active");
  btn.classList.add("active");
  if (tab === "flash") initFlashcards();
  if (tab === "quiz") initQuiz();
  if (tab === "updates") renderUpdates();
}

function renderPerkList() {
  var search = document.getElementById("searchInput").value.toLowerCase();
  var status = document.getElementById("filterStatus").value;
  var filtered = PERKS.filter(function(p) {
    if (search && p.name.toLowerCase().indexOf(search) < 0 && p.desc.toLowerCase().indexOf(search) < 0 && p.owner.toLowerCase().indexOf(search) < 0) return false;
    if (currentCat !== "all" && p.cat !== currentCat) return false;
    if (status === "learned"   && !isLearned(p.id)) return false;
    if (status === "unlearned" &&  isLearned(p.id)) return false;
    if (status === "updated"   && !p.updated) return false;
    return true;
  });
  var grid = document.getElementById("perkGrid");
  if (!filtered.length) { grid.innerHTML = '<div class="empty-state">該当するパークが見つかりません</div>'; return; }
  grid.innerHTML = filtered.map(function(p) {
    return '<div class="perk-card" onclick="openModal(\'' + p.id + '\')">'
      + '<div class="perk-card-header"><div class="perk-name">' + p.name + '</div>'
      + '<span class="perk-badge ' + CAT_BADGE[p.cat] + '">' + CAT_LABELS[p.cat] + '</span></div>'
      + '<div class="perk-owner">' + p.owner + '</div>'
      + '<div class="perk-desc">' + p.desc + '</div>'
      + '<div class="perk-card-footer">'
      + (isLearned(p.id) ? '<span class="learned-badge">&#x2713; 学習済み</span>' : '<span></span>')
      + (p.updated ? '<span class="updated-badge">&#x26A1; 変更あり</span>' : '<span></span>')
      + '</div></div>';
  }).join("");
}

function openModal(id) {
  var p = PERKS.find(function(x) { return x.id === id; });
  if (!p) return;
  currentModal = p;
  document.getElementById("modalTitle").textContent = p.name;
  document.getElementById("modalOwner").textContent = "取得キャラクター: " + p.owner + " ｜ カテゴリ: " + CAT_LABELS[p.cat];
  document.getElementById("modalDesc").textContent = p.desc;
  var upEl = document.getElementById("modalUpdate");
  if (p.updated) { document.getElementById("modalUpdateContent").textContent = p.updated; upEl.style.display = "block"; }
  else upEl.style.display = "none";
  document.getElementById("aiResponse").classList.remove("visible");
  document.getElementById("aiResponse").textContent = "";
  document.getElementById("aiBtn").disabled = false;
  document.getElementById("aiBtnText").textContent = "🔮 AIに詳しく解説してもらう";
  updateLearnBtn(p.id);
  document.getElementById("modalOverlay").classList.add("open");
}

function updateLearnBtn(id) {
  var btn = document.getElementById("modalLearnBtn");
  if (isLearned(id)) { btn.textContent = "✓ 学習済み（クリックで解除）"; btn.classList.add("learned"); }
  else { btn.textContent = "このパークを学習済みにする"; btn.classList.remove("learned"); }
}

function toggleLearnFromModal() {
  if (!currentModal) return;
  toggleLearn(currentModal.id);
  updateLearnBtn(currentModal.id);
  renderPerkList();
}

function closeModalBg(e) { if (e.target === document.getElementById("modalOverlay")) closeModal(); }
function closeModal() { document.getElementById("modalOverlay").classList.remove("open"); currentModal = null; }

async function askAI() {
  if (!currentModal) return;
  var apiKey = getApiKey();
  if (!apiKey) {
    alert("APIキーが設定されていません。\nパーク一覧タブ上部の「APIキー」欄に入力して保存してください。");
    return;
  }
  var btn = document.getElementById("aiBtn");
  var resEl = document.getElementById("aiResponse");
  btn.disabled = true;
  document.getElementById("aiBtnText").innerHTML = '<span class="loading-dots">解析中</span>';
  resEl.classList.remove("visible");
  var prompt = "Dead by Daylightのサバイバーパーク「" + currentModal.name + "」について解説してください。\n\nパーク効果: " + currentModal.desc + (currentModal.updated ? "\n最近の変更: " + currentModal.updated : "") + "\n\n以下を日本語で簡潔に:\n1. 使い方と立ち回りのコツ\n2. 特に活きる場面\n3. 相性の良いパーク（1〜2個）\n4. 弱点・注意点\n\n初心者向けに200〜300文字でまとめてください。";
  try {
    var res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: {"Content-Type": "application/json", "x-api-key": apiKey, "anthropic-version": "2023-06-01", "anthropic-dangerous-direct-browser-access": "true"},
      body: JSON.stringify({model:"claude-haiku-4-5-20251001", max_tokens:1000, messages:[{role:"user", content:prompt}]})
    });
    var data = await res.json();
    if (data.error) { throw new Error(data.error.message); }
    var text = data.content ? data.content.map(function(c) { return c.text || ""; }).join("") : "エラーが発生しました。";
    resEl.textContent = text;
    resEl.classList.add("visible");
    document.getElementById("aiBtnText").textContent = "🔄 もう一度解説してもらう";
    btn.disabled = false;
  } catch(e) {
    resEl.textContent = "エラー: " + e.message;
    resEl.classList.add("visible");
    btn.disabled = false;
    document.getElementById("aiBtnText").textContent = "🔮 AIに詳しく解説してもらう";
  }
}

async function checkLatestUpdates() {
  var apiKey = getApiKey();
  if (!apiKey) {
    alert("APIキーが設定されていません。\nパーク一覧タブ上部の「APIキー」欄に入力して保存してください。");
    return;
  }
  var btn = document.getElementById("checkUpdateBtn");
  var resEl = document.getElementById("checkResult");
  btn.disabled = true;
  document.getElementById("checkUpdateBtnText").innerHTML = '<span class="loading-dots">AIが確認中</span>';
  resEl.classList.remove("visible");
  var perkNames = PERKS.map(function(p) { return p.name; }).join("、");
  var prompt = "Dead by Daylightのサバイバーパークについて、直近のアップデート（2024年〜2025年）で効果が変更されたパークを教えてください。\n\n以下のパークが登録されています：\n" + perkNames + "\n\nこれらの中で変更があったパーク、または最近追加された重要な新パークがあれば、以下の形式で箇条書きしてください：\n・パーク名: 変更内容の要約\n\n情報が不確かな場合はその旨を明記してください。日本語で回答してください。";
  try {
    var res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: {"Content-Type": "application/json", "x-api-key": apiKey, "anthropic-version": "2023-06-01", "anthropic-dangerous-direct-browser-access": "true"},
      body: JSON.stringify({model:"claude-haiku-4-5-20251001", max_tokens:1500, messages:[{role:"user", content:prompt}]})
    });
    var data = await res.json();
    if (data.error) { throw new Error(data.error.message); }
    var text = data.content ? data.content.map(function(c) { return c.text || ""; }).join("") : "エラーが発生しました。";
    resEl.textContent = text;
    resEl.classList.add("visible");
  } catch(e) {
    resEl.textContent = "エラー: " + e.message;
    resEl.classList.add("visible");
  }
  btn.disabled = false;
  document.getElementById("checkUpdateBtnText").textContent = "🔍 AIに最新パーク変更を確認してもらう";
}

function shuffle(arr) {
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) { var j = Math.floor(Math.random() * (i + 1)); var t = a[i]; a[i] = a[j]; a[j] = t; }
  return a;
}

function setFcMode(mode, btn) {
  fcMode = mode;
  document.querySelectorAll(".fc-mode-btn").forEach(function(b) { b.classList.remove("active"); });
  btn.classList.add("active");
  initFlashcards();
}

function initFlashcards() {
  var pool = PERKS.slice();
  if (fcMode === "unlearned") pool = pool.filter(function(p) { return !isLearned(p.id); });
  if (fcMode === "updated")   pool = pool.filter(function(p) { return p.updated; });
  fcQueue = shuffle(pool); fcIndex = 0;
  document.getElementById("flashcard").classList.remove("flipped");
  showFlashcard();
}

function showFlashcard() {
  if (!fcQueue.length) {
    document.getElementById("fcName").textContent = "パークがありません";
    document.getElementById("fcOwner").textContent = "フィルターを変更してください";
    document.getElementById("fcDesc").textContent = "";
    document.getElementById("fcInfo").textContent = "0 / 0";
    document.getElementById("fcProgress").style.width = "0%";
    return;
  }
  var p = fcQueue[fcIndex % fcQueue.length];
  document.getElementById("fcName").textContent = p.name;
  document.getElementById("fcOwner").textContent = p.owner;
  document.getElementById("fcDesc").textContent = p.desc;
  var cur = fcIndex % fcQueue.length + 1;
  document.getElementById("fcInfo").textContent = cur + " / " + fcQueue.length;
  document.getElementById("fcProgress").style.width = (cur / fcQueue.length * 100) + "%";
  document.getElementById("flashcard").classList.remove("flipped");
}

function flipCard() { document.getElementById("flashcard").classList.toggle("flipped"); }

function fcAction(action) {
  if (!fcQueue.length) return;
  var p = fcQueue[fcIndex % fcQueue.length];
  if (action === "learn" && !isLearned(p.id)) toggleLearn(p.id);
  fcIndex++;
  if (fcIndex >= fcQueue.length) { if (action === "forget") { initFlashcards(); return; } fcIndex = 0; }
  showFlashcard();
}

function initQuiz() {
  var pool = shuffle(PERKS).slice(0, Math.min(10, PERKS.length));
  var questions = pool.map(function(p) {
    var type = Math.random() > 0.5 ? "name2desc" : "desc2name";
    var wrongs = shuffle(PERKS.filter(function(x) { return x.id !== p.id; })).slice(0, 3);
    if (type === "name2desc") {
      return {perk:p, type:type, options:shuffle([p.desc].concat(wrongs.map(function(x){return x.desc;}))), answer:p.desc};
    } else {
      var shortDesc = p.desc.length > 80 ? p.desc.slice(0, 80) + "…" : p.desc;
      return {perk:p, type:type, question:shortDesc, options:shuffle([p.name].concat(wrongs.map(function(x){return x.name;}))), answer:p.name};
    }
  });
  quizState = {questions:questions, current:0, score:0, answered:false};
  document.getElementById("quizResult").classList.remove("visible");
  document.getElementById("quizResult").style.display = "none";
  renderQuizQuestion();
}

function renderQuizQuestion() {
  var q = quizState.questions[quizState.current];
  if (!q) { showQuizResult(); return; }
  quizState.answered = false;
  document.getElementById("quizCount").textContent = "問題 " + (quizState.current + 1) + " / " + quizState.questions.length;
  var html = '<div class="quiz-question">'
    + '<div class="quiz-q-label">' + (q.type === "name2desc" ? "効果を選べ" : "パーク名を選べ") + '</div>'
    + (q.type === "name2desc" ? '<div class="quiz-q-perkname">' + q.perk.name + '</div>' : '<div class="quiz-q-text">' + q.question + '</div>')
    + '</div><div class="quiz-options">';
  q.options.forEach(function(opt) {
    var safe = opt.replace(/\\/g,"\\\\").replace(/'/g,"\\'");
    var safeAns = q.answer.replace(/\\/g,"\\\\").replace(/'/g,"\\'");
    html += '<button class="quiz-option" onclick="answerQuiz(this,\'' + safe + '\',\'' + safeAns + '\')">' + opt + '</button>';
  });
  html += '</div><div class="quiz-feedback" id="quizFeedback"></div>'
    + '<button class="quiz-next-btn" id="quizNextBtn" onclick="nextQuizQuestion()">次の問題 →</button>';
  document.getElementById("quizQuestion").innerHTML = html;
}

function answerQuiz(btn, selected, answer) {
  if (quizState.answered) return;
  quizState.answered = true;
  document.querySelectorAll(".quiz-option").forEach(function(b) {
    b.disabled = true;
    if (b.textContent.trim() === answer.trim()) b.classList.add("correct");
    else if (b === btn) b.classList.add("wrong");
  });
  var fb = document.getElementById("quizFeedback");
  if (selected.trim() === answer.trim()) {
    quizState.score++;
    fb.className = "quiz-feedback correct";
    fb.textContent = "✓ 正解！";
    var p = quizState.questions[quizState.current].perk;
    if (!isLearned(p.id)) toggleLearn(p.id);
  } else {
    fb.className = "quiz-feedback wrong";
    fb.textContent = "✗ 不正解。正解: " + answer;
  }
  document.getElementById("quizNextBtn").classList.add("visible");
}

function nextQuizQuestion() { quizState.current++; renderQuizQuestion(); }

function showQuizResult() {
  document.getElementById("quizQuestion").innerHTML = "";
  document.getElementById("quizCount").textContent = "";
  var res = document.getElementById("quizResult");
  res.style.display = "block"; res.classList.add("visible");
  var score = quizState.score, total = quizState.questions.length;
  var pct = Math.round(score / total * 100);
  res.innerHTML = '<div class="quiz-result-title">Result</div>'
    + '<div class="quiz-result-score">' + score + ' / ' + total + '</div>'
    + '<div class="quiz-result-detail">正答率 ' + pct + '% ｜ ' + (pct >= 80 ? "🔥 素晴らしい！" : pct >= 50 ? "📚 もう少し！" : "💀 復習しよう") + '</div>'
    + '<button class="quiz-restart-btn" onclick="initQuiz()">もう一度挑戦</button>';
}

function renderUpdates() {
  var grouped = {};
  updates.forEach(function(u) { if (!grouped[u.version]) grouped[u.version] = []; grouped[u.version].push(u); });
  var feed = document.getElementById("updateFeed");
  var versions = Object.keys(grouped).sort(function(a,b) { return b.localeCompare(a); });
  if (!versions.length) { feed.innerHTML = '<div class="empty-state">更新情報はまだありません。<br>上のフォームから追加してください。</div>'; return; }
  feed.innerHTML = versions.map(function(v) {
    return '<div class="update-card"><div class="update-version">⚡ Ver. ' + v + '</div>'
      + grouped[v].map(function(u) { return '<div class="update-perk-item"><strong>' + u.perkName + '</strong>: ' + u.content + '</div>'; }).join("")
      + '</div>';
  }).join("");
}

function addUpdate() {
  var version  = document.getElementById("updateVersion").value.trim();
  var perkName = document.getElementById("updatePerkName").value.trim();
  var content  = document.getElementById("updateContent").value.trim();
  if (!version || !perkName || !content) { alert("バージョン、パーク名、変更内容をすべて入力してください。"); return; }
  updates.unshift({version:version, perkName:perkName, content:content, date:new Date().toISOString()});
  localStorage.setItem("dbd_updates", JSON.stringify(updates));
  var p = PERKS.find(function(x) { return x.name === perkName; });
  if (p) p.updated = version + ": " + content;
  document.getElementById("updateVersion").selectedIndex = 0;
  document.getElementById("updatePerkName").selectedIndex = 0;
  document.getElementById("updateContent").value = "";
  renderUpdates();
  updateStats();
}

var perkSelect = document.getElementById("updatePerkName");
PERKS.forEach(function(p) {
  var opt = document.createElement("option");
  opt.value = p.name;
  opt.textContent = p.name + "（" + p.owner + "）";
  perkSelect.appendChild(opt);
});
if (getApiKey()) {
  var st = document.getElementById("apiKeyStatus");
  st.className = "api-key-status ok";
  st.textContent = "✓ APIキー設定済み";
}
updateStats();
renderPerkList();
</script>
</body>
</html>
