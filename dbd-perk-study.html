<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DbD Perk Study — The Fog Academy</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Cinzel:wght@400;600&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0608;
    --surface: #110d0f;
    --surface2: #1a1218;
    --border: #3a1f2a;
    --border-glow: #8b2535;
    --red: #c0392b;
    --red-bright: #e74c3c;
    --amber: #d4882a;
    --amber-dim: #8a5a1a;
    --fog: #4a3a5a;
    --fog-light: #7a6a8a;
    --text: #e8d8c8;
    --text-dim: #8a7a6a;
    --text-faint: #4a3a3a;
    --white: #f5ece0;
    --green: #2ecc71;
    --green-dim: #1a6a3a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Fog background effect */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: 
      radial-gradient(ellipse 80% 50% at 50% 0%, #1a0a1a55 0%, transparent 60%),
      radial-gradient(ellipse 60% 80% at 20% 100%, #0a0a2a44 0%, transparent 50%),
      radial-gradient(ellipse 40% 40% at 80% 50%, #2a0a0a33 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  .app { position: relative; z-index: 1; max-width: 900px; margin: 0 auto; padding: 16px; }

  /* Header */
  header {
    text-align: center;
    padding: 28px 0 20px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 24px;
  }
  header h1 {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(18px, 4vw, 28px);
    color: var(--red-bright);
    text-shadow: 0 0 20px #c0392b88, 0 0 40px #c0392b44;
    letter-spacing: 2px;
    line-height: 1.2;
  }
  header p {
    color: var(--fog-light);
    font-size: 12px;
    margin-top: 6px;
    font-family: 'Cinzel', serif;
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  /* Nav tabs */
  .nav {
    display: flex;
    gap: 4px;
    margin-bottom: 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 4px;
  }
  .nav-btn {
    flex: 1;
    padding: 10px 8px;
    background: none;
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    font-family: 'Cinzel', serif;
    font-size: 11px;
    letter-spacing: 1px;
    border-radius: 4px;
    transition: all 0.2s;
    text-align: center;
  }
  .nav-btn:hover { color: var(--text); background: var(--surface2); }
  .nav-btn.active {
    background: var(--border-glow);
    color: var(--white);
    text-shadow: 0 0 10px #ffffff66;
  }

  /* Sections */
  .section { display: none; }
  .section.active { display: block; }

  /* ===== PERK LIST ===== */
  .perk-controls {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
    flex-wrap: wrap;
    align-items: center;
  }
  .search-input {
    flex: 1;
    min-width: 180px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 14px;
    border-radius: 4px;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-input:focus { border-color: var(--border-glow); }
  .search-input::placeholder { color: var(--text-faint); }

  .filter-select {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 10px 12px;
    border-radius: 4px;
    font-size: 12px;
    cursor: pointer;
    outline: none;
  }

  .perk-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 10px;
  }

  .perk-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 14px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }
  .perk-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--border-glow);
    opacity: 0;
    transition: opacity 0.2s;
  }
  .perk-card:hover { border-color: var(--border-glow); background: var(--surface2); }
  .perk-card:hover::before { opacity: 1; }

  .perk-card-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 8px;
  }
  .perk-name {
    font-family: 'Cinzel', serif;
    font-size: 13px;
    font-weight: 600;
    color: var(--amber);
    line-height: 1.3;
  }
  .perk-badge {
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 10px;
    white-space: nowrap;
    flex-shrink: 0;
    margin-top: 2px;
  }
  .badge-chase { background: #3a1a1a; color: #e74c3c; border: 1px solid #5a2a2a; }
  .badge-gen    { background: #1a2a1a; color: #2ecc71; border: 1px solid #2a4a2a; }
  .badge-rescue { background: #1a1a3a; color: #5dade2; border: 1px solid #2a2a5a; }
  .badge-info   { background: #2a2a1a; color: #f1c40f; border: 1px solid #4a4a2a; }
  .badge-misc   { background: #2a1a2a; color: #a569bd; border: 1px solid #4a2a4a; }

  .perk-owner {
    font-size: 11px;
    color: var(--fog-light);
    margin: 4px 0 8px;
  }
  .perk-desc {
    font-size: 12px;
    color: var(--text-dim);
    line-height: 1.6;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .perk-card-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 10px;
    padding-top: 8px;
    border-top: 1px solid var(--border);
  }
  .learned-badge {
    font-size: 10px;
    color: var(--green);
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .updated-badge {
    font-size: 10px;
    color: var(--amber);
    background: #2a1a00;
    border: 1px solid var(--amber-dim);
    padding: 2px 7px;
    border-radius: 10px;
  }

  /* Perk Detail Modal */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: #000000cc;
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border-glow);
    border-radius: 8px;
    max-width: 560px;
    width: 100%;
    max-height: 85vh;
    overflow-y: auto;
    box-shadow: 0 0 60px #8b253544, 0 0 120px #8b253522;
  }
  .modal-header {
    padding: 20px 20px 0;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
  }
  .modal-title {
    font-family: 'Cinzel', serif;
    font-size: 18px;
    font-weight: 600;
    color: var(--amber);
  }
  .modal-close {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-dim);
    width: 28px; height: 28px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 16px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .modal-close:hover { border-color: var(--red); color: var(--red-bright); }
  .modal-body { padding: 16px 20px 20px; }
  .modal-owner { color: var(--fog-light); font-size: 12px; margin-bottom: 12px; }
  .modal-desc {
    font-size: 14px;
    line-height: 1.8;
    color: var(--text);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 14px;
    margin-bottom: 14px;
    white-space: pre-wrap;
  }
  .modal-update {
    font-size: 12px;
    background: #1a0f00;
    border: 1px solid var(--amber-dim);
    border-radius: 4px;
    padding: 10px 14px;
    margin-bottom: 14px;
    color: var(--amber);
    line-height: 1.7;
  }
  .modal-update-label {
    font-family: 'Cinzel', serif;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--amber-dim);
    margin-bottom: 4px;
    text-transform: uppercase;
  }
  .modal-ai-btn {
    width: 100%;
    padding: 12px;
    background: var(--border-glow);
    border: none;
    color: var(--white);
    font-family: 'Cinzel', serif;
    font-size: 13px;
    letter-spacing: 2px;
    cursor: pointer;
    border-radius: 4px;
    transition: all 0.2s;
    margin-bottom: 10px;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .modal-ai-btn:hover { background: var(--red-bright); }
  .modal-ai-btn:disabled { background: var(--border); color: var(--text-faint); cursor: not-allowed; }

  .ai-response {
    background: var(--surface2);
    border: 1px solid #2a3a2a;
    border-left: 3px solid var(--green-dim);
    border-radius: 4px;
    padding: 14px;
    font-size: 13px;
    line-height: 1.8;
    color: var(--text);
    white-space: pre-wrap;
    display: none;
  }
  .ai-response.visible { display: block; }

  .learn-btn {
    width: 100%;
    padding: 10px;
    background: none;
    border: 1px solid var(--green-dim);
    color: var(--green);
    font-family: 'Cinzel', serif;
    font-size: 12px;
    letter-spacing: 1px;
    cursor: pointer;
    border-radius: 4px;
    transition: all 0.2s;
    margin-top: 10px;
  }
  .learn-btn:hover { background: var(--green-dim); }
  .learn-btn.learned { border-color: var(--green); background: #0a2a1a; }

  /* ===== FLASHCARDS ===== */
  .flashcard-area {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }
  .fc-info {
    font-size: 12px;
    color: var(--text-dim);
    font-family: 'Cinzel', serif;
    letter-spacing: 2px;
  }
  .fc-mode-select {
    display: flex;
    gap: 8px;
    margin-bottom: 8px;
  }
  .fc-mode-btn {
    padding: 7px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-dim);
    cursor: pointer;
    font-size: 12px;
    border-radius: 4px;
    transition: all 0.2s;
  }
  .fc-mode-btn.active { border-color: var(--amber-dim); color: var(--amber); background: #1a1200; }

  .flashcard {
    width: 100%;
    max-width: 520px;
    height: 260px;
    perspective: 1000px;
    cursor: pointer;
  }
  .flashcard-inner {
    width: 100%; height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.5s;
  }
  .flashcard.flipped .flashcard-inner { transform: rotateY(180deg); }

  .fc-front, .fc-back {
    position: absolute;
    inset: 0;
    border-radius: 8px;
    backface-visibility: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    text-align: center;
    border: 1px solid var(--border);
  }
  .fc-front {
    background: var(--surface);
    border-color: var(--border-glow);
    box-shadow: 0 0 30px #8b253522;
  }
  .fc-back {
    background: var(--surface2);
    transform: rotateY(180deg);
    border-color: var(--green-dim);
  }
  .fc-hint { font-size: 11px; color: var(--text-faint); margin-bottom: 12px; letter-spacing: 2px; text-transform: uppercase; font-family: 'Cinzel', serif; }
  .fc-front-name {
    font-family: 'Cinzel', serif;
    font-size: clamp(18px, 4vw, 26px);
    font-weight: 600;
    color: var(--amber);
    line-height: 1.3;
    text-shadow: 0 0 20px #d4882a44;
  }
  .fc-front-owner { font-size: 12px; color: var(--fog-light); margin-top: 8px; }
  .fc-back-desc {
    font-size: 13px;
    line-height: 1.7;
    color: var(--text);
  }

  .fc-actions {
    display: flex;
    gap: 10px;
    width: 100%;
    max-width: 520px;
  }
  .fc-btn {
    flex: 1;
    padding: 12px;
    border: 1px solid;
    border-radius: 4px;
    cursor: pointer;
    font-family: 'Cinzel', serif;
    font-size: 12px;
    letter-spacing: 1px;
    background: none;
    transition: all 0.2s;
  }
  .fc-btn-forget { border-color: #5a2a2a; color: var(--red); }
  .fc-btn-forget:hover { background: #2a0a0a; }
  .fc-btn-learn  { border-color: var(--green-dim); color: var(--green); }
  .fc-btn-learn:hover { background: #0a2a1a; }
  .fc-btn-skip   { border-color: var(--border); color: var(--text-dim); }
  .fc-btn-skip:hover { background: var(--surface2); }

  /* Progress bar */
  .progress-bar-wrap {
    width: 100%; max-width: 520px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    height: 6px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--red), var(--amber));
    transition: width 0.3s;
  }

  /* ===== QUIZ ===== */
  .quiz-area { max-width: 620px; margin: 0 auto; }
  .quiz-q-count { font-size: 12px; color: var(--text-dim); margin-bottom: 16px; font-family: 'Cinzel', serif; letter-spacing: 2px; text-align: center; }
  .quiz-question {
    background: var(--surface);
    border: 1px solid var(--border-glow);
    border-radius: 8px;
    padding: 20px;
    margin-bottom: 16px;
    box-shadow: 0 0 30px #8b253522;
  }
  .quiz-q-label { font-size: 11px; color: var(--border-glow); letter-spacing: 3px; text-transform: uppercase; font-family: 'Cinzel', serif; margin-bottom: 10px; }
  .quiz-q-text { font-size: 14px; line-height: 1.7; color: var(--text); }
  .quiz-q-perkname { font-family: 'Cinzel', serif; font-size: 18px; color: var(--amber); text-align: center; padding: 10px 0; }

  .quiz-options { display: grid; gap: 8px; }
  .quiz-option {
    padding: 13px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    cursor: pointer;
    font-size: 13px;
    color: var(--text);
    text-align: left;
    transition: all 0.2s;
    line-height: 1.5;
  }
  .quiz-option:hover:not(:disabled) { border-color: var(--fog); background: var(--surface2); }
  .quiz-option.correct { border-color: var(--green); background: #0a2a1a; color: var(--green); }
  .quiz-option.wrong   { border-color: var(--red); background: #2a0a0a; color: var(--red-bright); }
  .quiz-option:disabled { cursor: default; }

  .quiz-feedback {
    padding: 12px 16px;
    border-radius: 4px;
    font-size: 13px;
    line-height: 1.6;
    display: none;
    margin-top: 8px;
  }
  .quiz-feedback.correct { background: #0a2a1a; border: 1px solid var(--green-dim); color: var(--green); display: block; }
  .quiz-feedback.wrong   { background: #2a0a0a; border: 1px solid #5a2a2a; color: var(--red-bright); display: block; }

  .quiz-next-btn {
    width: 100%;
    margin-top: 14px;
    padding: 13px;
    background: var(--border-glow);
    border: none;
    color: var(--white);
    font-family: 'Cinzel', serif;
    font-size: 13px;
    letter-spacing: 2px;
    cursor: pointer;
    border-radius: 4px;
    display: none;
    transition: all 0.2s;
  }
  .quiz-next-btn:hover { background: var(--red-bright); }
  .quiz-next-btn.visible { display: block; }

  .quiz-result {
    text-align: center;
    padding: 40px 20px;
    display: none;
  }
  .quiz-result.visible { display: block; }
  .quiz-result-title {
    font-family: 'Cinzel Decorative', serif;
    font-size: 24px;
    color: var(--amber);
    margin-bottom: 16px;
    text-shadow: 0 0 20px #d4882a66;
  }
  .quiz-result-score {
    font-size: 48px;
    font-weight: 700;
    color: var(--red-bright);
    text-shadow: 0 0 30px #e74c3c88;
    margin-bottom: 16px;
  }
  .quiz-result-detail { color: var(--text-dim); font-size: 14px; margin-bottom: 24px; }
  .quiz-restart-btn {
    padding: 12px 32px;
    background: var(--border-glow);
    border: none;
    color: var(--white);
    font-family: 'Cinzel', serif;
    font-size: 13px;
    letter-spacing: 2px;
    cursor: pointer;
    border-radius: 4px;
    transition: all 0.2s;
  }
  .quiz-restart-btn:hover { background: var(--red-bright); }

  /* ===== UPDATE FEED ===== */
  .update-feed { display: flex; flex-direction: column; gap: 12px; }
  .update-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 3px solid var(--amber-dim);
    border-radius: 6px;
    padding: 16px;
  }
  .update-version { font-family: 'Cinzel', serif; font-size: 11px; color: var(--amber); letter-spacing: 2px; margin-bottom: 6px; }
  .update-perks { display: flex; flex-direction: column; gap: 6px; }
  .update-perk-item { font-size: 13px; color: var(--text-dim); line-height: 1.6; }
  .update-perk-item strong { color: var(--text); }

  .add-update-form {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 16px;
    margin-bottom: 16px;
  }
  .add-update-title { font-family: 'Cinzel', serif; font-size: 13px; color: var(--amber); margin-bottom: 12px; letter-spacing: 2px; }
  .form-row { display: flex; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
  .form-input {
    flex: 1;
    min-width: 120px;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 9px 12px;
    border-radius: 4px;
    font-size: 13px;
    outline: none;
    font-family: 'Noto Sans JP', sans-serif;
  }
  .form-input:focus { border-color: var(--border-glow); }
  .form-textarea {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 9px 12px;
    border-radius: 4px;
    font-size: 13px;
    outline: none;
    resize: vertical;
    min-height: 80px;
    font-family: 'Noto Sans JP', sans-serif;
    line-height: 1.6;
    margin-bottom: 8px;
  }
  .form-textarea:focus { border-color: var(--border-glow); }
  .form-submit-btn {
    padding: 10px 20px;
    background: var(--border-glow);
    border: none;
    color: var(--white);
    font-family: 'Cinzel', serif;
    font-size: 12px;
    letter-spacing: 1px;
    cursor: pointer;
    border-radius: 4px;
    transition: all 0.2s;
  }
  .form-submit-btn:hover { background: var(--red-bright); }

  /* Stats */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-bottom: 20px;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 14px;
    text-align: center;
  }
  .stat-num { font-size: 28px; font-weight: 700; color: var(--red-bright); text-shadow: 0 0 20px #e74c3c66; }
  .stat-label { font-size: 11px; color: var(--text-dim); margin-top: 4px; font-family: 'Cinzel', serif; letter-spacing: 1px; }

  /* Empty state */
  .empty-state { text-align: center; padding: 40px; color: var(--text-faint); font-size: 14px; }

  /* Loading */
  .loading-dots::after {
    content: '';
    animation: dots 1.2s steps(4, end) infinite;
  }
  @keyframes dots {
    0%   { content: ''; }
    25%  { content: '.'; }
    50%  { content: '..'; }
    75%  { content: '...'; }
    100% { content: ''; }
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--border-glow); }

  @media (max-width: 480px) {
    .perk-grid { grid-template-columns: 1fr; }
    .stats-row { grid-template-columns: repeat(3, 1fr); }
    .stat-num { font-size: 20px; }
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <h1>⚰ The Fog Academy ⚰</h1>
    <p>Dead by Daylight — Survivor Perk Study</p>
  </header>

  <div class="stats-row" id="statsRow">
    <div class="stat-card">
      <div class="stat-num" id="statTotal">0</div>
      <div class="stat-label">Total Perks</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="statLearned">0</div>
      <div class="stat-label">Learned</div>
    </div>

// ===== STATE =====
let learned = JSON.parse(localStorage.getItem('dbd_learned') || '[]');
let updates = JSON.parse(localStorage.getItem('dbd_updates') || '[]');
let currentModal = null;
let fcQueue = [];
let fcIndex = 0;
let fcMode = 'all';
let quizState = { questions: [], current: 0, score: 0, answered: false };
let currentTab = 'list';

// Apply stored updates to perks
function applyUpdates() {
  updates.forEach(u => {
    const p = PERKS_DATA.find(p => p.name === u.perkName || p.id === u.perkId);
    if (p) p.updated = `${u.version}: ${u.content}`;
  });
}
applyUpdates();

// ===== UTILS =====
function isLearned(id) { return learned.includes(id); }
function toggleLearn(id) {
  if (isLearned(id)) {
    learned = learned.filter(x => x !== id);
  } else {
    learned.push(id);
  }
  localStorage.setItem('dbd_learned', JSON.stringify(learned));
  updateStats();
}

function updateStats() {
  document.getElementById('statTotal').textContent = PERKS_DATA.length;
  document.getElementById('statLearned').textContent = learned.length;
  document.getElementById('statUpdated').textContent = PERKS_DATA.filter(p => p.updated).length;
}

const CAT_LABELS = { chase:'チェイス', gen:'発電機', rescue:'救助', info:'情報', misc:'その他' };
const CAT_BADGE  = { chase:'badge-chase', gen:'badge-gen', rescue:'badge-rescue', info:'badge-info', misc:'badge-misc' };

// ===== TAB SWITCH =====
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  event.currentTarget.classList.add('active');

  if (tab === 'flash') initFlashcards();
  if (tab === 'quiz')  initQuiz();
  if (tab === 'updates') renderUpdates();
}

// ===== PERK LIST =====
function renderPerkList() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  const cat    = document.getElementById('filterCat').value;
  const status = document.getElementById('filterStatus').value;

  let filtered = PERKS_DATA.filter(p => {
    if (search && !p.name.toLowerCase().includes(search) && !p.desc.toLowerCase().includes(search) && !p.owner.toLowerCase().includes(search)) return false;
    if (cat && p.cat !== cat) return false;
    if (status === 'learned'   && !isLearned(p.id)) return false;
    if (status === 'unlearned' && isLearned(p.id))  return false;
    if (status === 'updated'   && !p.updated)        return false;
    return true;
  });

  const grid = document.getElementById('perkGrid');
  if (filtered.length === 0) {
    grid.innerHTML = '<div class="empty-state">該当するパークが見つかりません</div>';
    return;
  }

  grid.innerHTML = filtered.map(p => `
    <div class="perk-card" onclick="openModal('${p.id}')">
      <div class="perk-card-header">
        <div class="perk-name">${p.name}</div>
        <span class="perk-badge ${CAT_BADGE[p.cat]}">${CAT_LABELS[p.cat]}</span>
      </div>
      <div class="perk-owner">${p.owner}</div>
      <div class="perk-desc">${p.desc}</div>
      <div class="perk-card-footer">
        ${isLearned(p.id) ? '<span class="learned-badge">✓ 学習済み</span>' : '<span></span>'}
        ${p.updated ? '<span class="updated-badge">⚡ 変更あり</span>' : '<span></span>'}
      </div>
    </div>
  `).join('');
}

// ===== MODAL =====
function openModal(id) {
  const p = PERKS_DATA.find(x => x.id === id);
  if (!p) return;
  currentModal = p;
  document.getElementById('modalTitle').textContent = p.name;
  document.getElementById('modalOwner').textContent = '取得キャラクター: ' + p.owner + ' ｜ カテゴリ: ' + CAT_LABELS[p.cat];
  document.getElementById('modalDesc').textContent = p.desc;

  const updateEl = document.getElementById('modalUpdate');
  if (p.updated) {
    document.getElementById('modalUpdateContent').textContent = p.updated;
    updateEl.style.display = 'block';
  } else {
    updateEl.style.display = 'none';
  }

  document.getElementById('aiResponse').classList.remove('visible');
  document.getElementById('aiResponse').textContent = '';
  const aiBtn = document.getElementById('aiBtn');
  aiBtn.disabled = false;
  document.getElementById('aiBtnText').textContent = '🔮 AIに詳しく解説してもらう';

  updateLearnBtn(p.id);
  document.getElementById('modalOverlay').classList.add('open');
}

function updateLearnBtn(id) {
  const btn = document.getElementById('modalLearnBtn');
  if (isLearned(id)) {
    btn.textContent = '✓ 学習済み（クリックで解除）';
    btn.classList.add('learned');
  } else {
    btn.textContent = 'このパークを学習済みにする';
    btn.classList.remove('learned');
  }
}

function toggleLearnFromModal() {
  if (!currentModal) return;
  toggleLearn(currentModal.id);
  updateLearnBtn(currentModal.id);
  renderPerkList();
}

function closeModal(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModalDirect();
}
function closeModalDirect() {
  document.getElementById('modalOverlay').classList.remove('open');
  currentModal = null;
}

// ===== AI EXPLANATION =====
async function askAI() {
  if (!currentModal) return;
  const btn = document.getElementById('aiBtn');
  const responseEl = document.getElementById('aiResponse');
  btn.disabled = true;
  document.getElementById('aiBtnText').innerHTML = '<span class="loading-dots">解析中</span>';
  responseEl.classList.remove('visible');

  const prompt = `Dead by Daylightのサバイバーパーク「${currentModal.name}」について、以下を簡潔に日本語で解説してください：

パーク効果: ${currentModal.desc}
${currentModal.updated ? '最近の変更: ' + currentModal.updated : ''}

1. このパークの使い方と立ち回りのコツ（具体的に）
2. このパークが特に活きる場面・状況
3. 相性の良いパークの組み合わせ例（1〜2個）
4. 注意点や弱点

初心者にもわかりやすく、200〜300文字程度でまとめてください。`;

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{ role: 'user', content: prompt }]
      })
    });
    const data = await response.json();
    const text = data.content?.map(c => c.text || '').join('') || 'エラーが発生しました。';
    responseEl.textContent = text;
    responseEl.classList.add('visible');
    document.getElementById('aiBtnText').textContent = '🔄 もう一度解説してもらう';
    btn.disabled = false;
  } catch (e) {
    responseEl.textContent = 'AI解説の取得に失敗しました。ネットワーク接続を確認してください。';
    responseEl.classList.add('visible');
    btn.disabled = false;
    document.getElementById('aiBtnText').textContent = '🔮 AIに詳しく解説してもらう';
  }
}

// ===== FLASHCARDS =====
function setFcMode(mode, btn) {
  fcMode = mode;
  document.querySelectorAll('.fc-mode-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  initFlashcards();
}

function initFlashcards() {
  let pool = [...PERKS_DATA];
  if (fcMode === 'unlearned') pool = pool.filter(p => !isLearned(p.id));
  if (fcMode === 'updated')   pool = pool.filter(p => p.updated);
  // Shuffle
  for (let i = pool.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [pool[i], pool[j]] = [pool[j], pool[i]];
  }
  fcQueue = pool;
  fcIndex = 0;
  document.getElementById('flashcard').classList.remove('flipped');
  showFlashcard();
}

function showFlashcard() {
  if (fcQueue.length === 0) {
    document.getElementById('fcName').textContent = 'パークがありません';
    document.getElementById('fcOwner').textContent = 'フィルターを変更してください';
    document.getElementById('fcDesc').textContent = '';
    document.getElementById('fcInfo').textContent = '0 / 0';
    document.getElementById('fcProgress').style.width = '0%';
    return;
  }
  const p = fcQueue[fcIndex % fcQueue.length];
  document.getElementById('fcName').textContent = p.name;
  document.getElementById('fcOwner').textContent = p.owner;
  document.getElementById('fcDesc').textContent = p.desc;
  const cur = fcIndex % fcQueue.length + 1;
  document.getElementById('fcInfo').textContent = `${cur} / ${fcQueue.length}`;
  document.getElementById('fcProgress').style.width = `${(cur / fcQueue.length) * 100}%`;
  document.getElementById('flashcard').classList.remove('flipped');
}

function flipCard() {
  document.getElementById('flashcard').classList.toggle('flipped');
}

function fcAction(action) {
  if (fcQueue.length === 0) return;
  const p = fcQueue[fcIndex % fcQueue.length];
  if (action === 'learn' && !isLearned(p.id)) {
    toggleLearn(p.id);
  }
  fcIndex++;
  if (fcIndex >= fcQueue.length) {
    if (action !== 'forget') {
      fcIndex = 0;
    } else {
      initFlashcards();
      return;
    }
  }
  showFlashcard();
}

// ===== QUIZ =====
function initQuiz() {
  const pool = [...PERKS_DATA];
  for (let i = pool.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [pool[i], pool[j]] = [pool[j], pool[i]];
  }
  const questions = pool.slice(0, Math.min(10, pool.length)).map(p => {
    const type = Math.random() > 0.5 ? 'name2desc' : 'desc2name';
    const wrongs = PERKS_DATA.filter(x => x.id !== p.id);
    const shuffleW = wrongs.sort(() => Math.random() - 0.5).slice(0, 3);
    if (type === 'name2desc') {
      const opts = [p.desc, ...shuffleW.map(x => x.desc)].sort(() => Math.random() - 0.5);
      return { perk: p, type, question: `「${p.name}」の効果はどれ？`, options: opts, answer: p.desc };
    } else {
      const opts = [p.name, ...shuffleW.map(x => x.name)].sort(() => Math.random() - 0.5);
      const shortDesc = p.desc.length > 80 ? p.desc.slice(0, 80) + '…' : p.desc;
      return { perk: p, type, question: shortDesc, options: opts, answer: p.name };
    }
  });
  quizState = { questions, current: 0, score: 0, answered: false };
  document.getElementById('quizResult').classList.remove('visible');
  document.getElementById('quizResult').style.display = 'none';
  renderQuizQuestion();
}

function renderQuizQuestion() {
  const { questions, current } = quizState;
  if (current >= questions.length) {
    showQuizResult();
    return;
  }
  const q = questions[current];
  quizState.answered = false;
  document.getElementById('quizCount').textContent = `問題 ${current + 1} / ${questions.length}`;
  document.getElementById('quizQuestion').innerHTML = `
    <div class="quiz-question">
      <div class="quiz-q-label">${q.type === 'name2desc' ? '効果を選べ' : 'パーク名を選べ'}</div>
      ${q.type === 'name2desc' ? `<div class="quiz-q-perkname">${q.perk.name}</div>` : ''}
      <div class="quiz-q-text">${q.type === 'desc2name' ? q.question : ''}</div>
    </div>
    <div class="quiz-options">
      ${q.options.map(opt => `<button class="quiz-option" onclick="answerQuiz(this, '${opt.replace(/'/g, "\\'")}', '${q.answer.replace(/'/g, "\\'")}')">${opt}</button>`).join('')}
    </div>
    <div class="quiz-feedback" id="quizFeedback"></div>
    <button class="quiz-next-btn" id="quizNextBtn" onclick="nextQuizQuestion()">次の問題 →</button>
  `;
}

function answerQuiz(btn, selected, answer) {
  if (quizState.answered) return;
  quizState.answered = true;
  const allBtns = btn.parentElement.querySelectorAll('.quiz-option');
  allBtns.forEach(b => {
    b.disabled = true;
    if (b.textContent === answer) b.classList.add('correct');
    else if (b === btn && b.textContent !== answer) b.classList.add('wrong');
  });
  const feedback = document.getElementById('quizFeedback');
  if (selected === answer) {
    quizState.score++;
    feedback.className = 'quiz-feedback correct';
    feedback.textContent = '✓ 正解！';
    // Mark as learned
    const p = quizState.questions[quizState.current].perk;
    if (!isLearned(p.id)) toggleLearn(p.id);
  } else {
    feedback.className = 'quiz-feedback wrong';
    feedback.textContent = `✗ 不正解。正解: ${answer}`;
  }
  document.getElementById('quizNextBtn').classList.add('visible');
}

function nextQuizQuestion() {
  quizState.current++;
  renderQuizQuestion();
}

function showQuizResult() {
  document.getElementById('quizQuestion').innerHTML = '';
  document.getElementById('quizCount').textContent = '';
  const result = document.getElementById('quizResult');
  result.style.display = 'block';
  result.classList.add('visible');
  const { score, questions } = quizState;
  const pct = Math.round((score / questions.length) * 100);
  result.innerHTML = `
    <div class="quiz-result-title">Result</div>
    <div class="quiz-result-score">${score} / ${questions.length}</div>
    <div class="quiz-result-detail">正答率 ${pct}% ｜ ${pct >= 80 ? '🔥 素晴らしい！' : pct >= 50 ? '📚 もう少し！' : '💀 復習しよう'}</div>
    <button class="quiz-restart-btn" onclick="initQuiz()">もう一度挑戦</button>
  `;
}

// ===== UPDATES =====
function renderUpdates() {
  // Group by version
  const grouped = {};
  updates.forEach(u => {
    if (!grouped[u.version]) grouped[u.version] = [];
    grouped[u.version].push(u);
  });

  const feed = document.getElementById('updateFeed');
  const versions = Object.keys(grouped).sort((a, b) => b.localeCompare(a));

  if (versions.length === 0) {
    feed.innerHTML = '<div class="empty-state">更新情報はまだありません。<br>上のフォームから追加してください。</div>';
    return;
  }

  feed.innerHTML = versions.map(v => `
    <div class="update-card">
      <div class="update-version">⚡ Ver. ${v}</div>
      <div class="update-perks">
        ${grouped[v].map(u => `<div class="update-perk-item"><strong>${u.perkName}</strong>: ${u.content}</div>`).join('')}
      </div>
    </div>
  `).join('');
}

function addUpdate() {
  const version = document.getElementById('updateVersion').value.trim();
  const perkName = document.getElementById('updatePerkName').value.trim();
  const content = document.getElementById('updateContent').value.trim();
  if (!version || !perkName || !content) {
    alert('バージョン、パーク名、変更内容をすべて入力してください。');
    return;
  }
  const entry = { version, perkName, content, date: new Date().toISOString() };
  updates.unshift(entry);
  localStorage.setItem('dbd_updates', JSON.stringify(updates));

  // Update perk data
  const p = PERKS_DATA.find(x => x.name === perkName);
  if (p) p.updated = `${version}: ${content}`;

  document.getElementById('updateVersion').value = '';
  document.getElementById('updatePerkName').value = '';
  document.getElementById('updateContent').value = '';

  renderUpdates();
  updateStats();
}

function buildPerkNameDatalist() {
  const dl = document.getElementById('perkNameList');
  dl.innerHTML = PERKS_DATA.map(p => `<option value="${p.name}">`).join('');
}

// ===== INIT =====
function init() {
  updateStats();
  renderPerkList();
  buildPerkNameDatalist();
}

init();
</script>
